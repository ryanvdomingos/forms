<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Form</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <!-- Parte da logo a esquerda do site-->
    <div class="container-principal">
        
        <aside class="lateral-esquerda">
            <header>
                <h1 id="titulo">ARISE</h1>
            </header>
        </aside>
        <!-- Formulario a direita do site-->
        <main class="conteudo-direito">
            <section class="intro">
                <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. <br>Sign up <i>now</i> to get started.<br><br>
                You <i>Know</i> you want to.</p>
            </section>
            
            <section class="paragrafo">
                <h2>Let's do this!</h2>
                
                <form method="POST">
                    <div class="form-container">
                        
                        <div class="input-group">
                            <label for="name">FIRST NAME:</label>
                            <input type="text" id="name" name="user_name" required>
                        </div>

                        <div class="input-group">
                            <label for="last-name">LAST NAME:</label>
                            <input type="text" id="last-name" name="user_last_name">
                        </div>

                        <div class="input-group">
                            <label for="phone">PHONE NUMBER:</label>
                            <input type="tel" id="phone" name="user_phone">
                        </div>

                        <div class="input-group">
                            <label for="email">EMAIL:</label>
                            <input type="email" id="email" name="user_email" required>
                        </div>

                        <div class="input-group">
                            <label for="password">PASSWORD:</label>
                            <input type="password" id="password" name="user_password" required>
                        </div>

                        <div class="input-group">
                            <label for="confirm">CONFIRM PASSWORD:</label>
                            <input type="password" id="confirm" name="user_confirm_password" required>
                        </div>
                        
                    </div> 
                    
                    <button type="submit" class="submit">Create Account</button>
                </form>
            </section>
            <!-- Rodapé do site-->
            <footer>
                <p>Already have an account? <a href="#">Log in</a></p>
            </footer>

        </main>
    </div>
</body>
</html>
